    PinterestFields:
      type: object
      required:
        - pinterestBoardId
      properties:
        pinterestBoardId:
          type: string
    InstagramFields:
      type: object
      required:
        - postType
      properties:
        postType:
          $ref: "#/components/schemas/InstagramPostType"
    FacebookFields:
      type: object
      required:
        - postType
      properties:
        link:
          type: string
        postType:
          $ref: "#/components/schemas/FacebookPostType"
    TikTokFields:
      type: object
      required:
        - postType
        - privacyLevel
        - allowComment
        - allowDuet
        - allowStitch
        - contentDisclosureEnabled
        - isYourBrand
        - isBrandedContent
        - autoAddMusic
      properties:
        postType:
          $ref: "#/components/schemas/TikTokPostType"
        privacyLevel:
          $ref: "#/components/schemas/TikTokPrivacyLevel"
        allowComment:
          type: boolean
          description: Whether comments should be allowed for this TikTok post.
        allowDuet:
          type: boolean
          description: |
            Whether duets should be allowed for this TikTok post.

            This field applies to `postType=VIDEO`.

            When `postType=PHOTO`, this field is required by the API contract
            but is not used by TikTok.
        allowStitch:
          type: boolean
          description: |
            Whether stitches should be allowed for this TikTok post.

            This field applies to `postType=VIDEO`.

            When `postType=PHOTO`, this field is required by the API contract
            but is not used by TikTok.
        contentDisclosureEnabled:
          type: boolean
          description: Whether TikTok content disclosure should be enabled for this post.
        isYourBrand:
          type: boolean
          description: Whether the post should be disclosed as "Your brand" content on TikTok.
        isBrandedContent:
          type: boolean
          description: Whether the post should be disclosed as branded content on TikTok.
        autoAddMusic:
          type: boolean
          description: |
            Whether TikTok should automatically add music to this post.

            This field applies to `postType=PHOTO`.

            When `postType=VIDEO`, this field is required by the API contract
            but is not used by TikTok.
    YouTubeFields:
      type: object
      properties:
        privacy:
          $ref: "#/components/schemas/YouTubePrivacy"
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        madeForKids:
          type: boolean
