openapi: 3.1.0
info:
  title: WoopSocial API
  version: 1.0.0
  summary: API for WoopSocial integrations.
  description: |
    This is the public-facing OpenAPI contract for WoopSocial. It supports scheduling posts for various social media platforms such as Facebook, Instagram, LinkedIn, LinkedIn Pages, Pinterest, TikTok, X (formerly Twitter) and YouTube.
servers:
  - url: https://api.woopsocial.com/v1
    description: WoopSocial API URL.
tags:
  - name: Posts
    description: Post scheduling endpoints.
  - name: Projects
    description: Project discovery endpoints.
  - name: Social Accounts
    description: Connected social account discovery endpoints.
  - name: Media
    description: Media upload endpoints.
  - name: Webhooks
    description: Webhook endpoint management.
  - name: Health
    description: Basic connectivity endpoints.
paths:
  /posts:
    post:
      operationId: createPost
      tags:
        - Posts
      security:
        - ApiKey: []
      summary: Create post
      description: |
        Creates one post resource with one or more social-account targets.

        All referenced social accounts must belong to the same project.

        The request is validated atomically. If any social-account target fails
        validation, the post is not created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "422":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePostErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePostErrorResponse"
  /posts/{postId}:
    get:
      operationId: getPost
      tags:
        - Posts
      security:
        - ApiKey: []
      summary: Get post
      description: |
        Returns one post with its social account posts inline.
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Post found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Post not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPostErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPostErrorResponse"
    delete:
      operationId: deletePost
      tags:
        - Posts
      security:
        - ApiKey: []
      summary: Delete post
      description: |
        Deletes one scheduled post by post ID.

        A post can only be deleted when all of its social-account deliveries are
        still `NOT_STARTED`.
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "204":
          description: Post deleted.
        "404":
          description: Post not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePostErrorResponse"
        "409":
          description: Post cannot be deleted in its current state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePostErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePostErrorResponse"
  /social-account-posts:
    get:
      operationId: listSocialAccountPosts
      tags:
        - Posts
      security:
        - ApiKey: []
      summary: List social account posts
      description: |
        Returns standalone social account posts for the API key's organization.

        Each item includes the materialized content and schedule for that
        social-account target.
      parameters:
        - $ref: "#/components/parameters/ProjectIdsFilter"
        - $ref: "#/components/parameters/SocialAccountIdsFilter"
        - $ref: "#/components/parameters/PostIdsFilter"
        - $ref: "#/components/parameters/SocialPlatformFilter"
        - $ref: "#/components/parameters/DeliveryStatusFilter"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Social account posts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSocialAccountPostsResponse"
  /projects:
    get:
      operationId: listProjects
      tags:
        - Projects
      security:
        - ApiKey: []
      summary: List projects
      description: Returns projects that belong to the same organization as the API key. A project corresponds to a "Business Profile" in the UI.
      responses:
        "200":
          description: Projects available for media upload and post creation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
  /social-accounts/authorization-url:
    post:
      operationId: createOAuthAuthorization
      tags:
        - Social Accounts
      security:
        - ApiKey: []
      summary: Generate OAuth URL
      description: |
        Generates a browser authorization URL for connecting a new social account to a project. Open the returned `url` in a browser to complete the platform-specific OAuth flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOAuthAuthorizationRequest"
      responses:
        "200":
          description: OAuth authorization URL created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOAuthAuthorizationResponse"
  /social-accounts:
    get:
      operationId: listSocialAccounts
      tags:
        - Social Accounts
      security:
        - ApiKey: []
      summary: List social accounts
      description: |
        Returns social accounts that can currently be used for publishing.

        When `projectId` is provided, only social accounts usable within that project are returned.
      parameters:
        - $ref: "#/components/parameters/ProjectIdFilter"
      responses:
        "200":
          description: Social accounts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialAccount"
  /social-accounts/{socialAccountId}/platform-inputs:
    get:
      operationId: getSocialAccountPlatformInputs
      tags:
        - Social Accounts
      security:
        - ApiKey: []
      summary: Get platform-specific input options
      description: |
        Returns platform-specific input options for a connected social account.

        Use this endpoint to discover valid values for flattened post-target
        fields such as `pinterestBoardId` and `privacyLevel`.
      parameters:
        - $ref: "#/components/parameters/SocialAccountId"
      responses:
        "200":
          description: Social-account-specific platform input options.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialAccountPlatformInputs"
  /media:
    post:
      operationId: createMedia
      tags:
        - Media
      security:
        - ApiKey: []
      summary: Upload media
      description: |
        Uploads a media file in a single request and creates a media item.

        The server determines the media MIME type from the uploaded file.

        Use this endpoint for straightforward uploads up to 600 MB.

        For larger files, or when you need presigned part URLs, use the upload
        session flow under `/media/upload-sessions`.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          "*/*":
            schema:
              type: string
              format: binary
              description: |
                Media file to upload. Maximum size is 600 MB.

                The `Content-Type` header is ignored — the server determines the
                actual media MIME type from the file contents.
      responses:
        "200":
          description: Media uploaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMediaResponse"
  /media/upload-sessions:
    post:
      operationId: createUploadSession
      tags:
        - Media
      security:
        - ApiKey: []
      summary: Start media upload session
      description: |
        Creates an upload session and returns presigned URLs for uploading the file in parts.

        This flow is intended for larger files where a single-request upload via the simpler `/media` endpoint is less practical.

        Upload the file in `partCount` parts, using the matching
        `parts[n].uploadUrl` for each part number.

        Every part except the last must be exactly `partSizeInBytes` bytes. The
        last part may be smaller. After all parts have been uploaded, call
        `/media/upload-sessions/{uploadSessionId}/complete` to finalize the upload
        and create the media item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadSessionRequest"
      responses:
        "200":
          description: Upload session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSession"
  /media/upload-sessions/{uploadSessionId}:
    get:
      operationId: getUploadSession
      tags:
        - Media
      security:
        - ApiKey: []
      summary: Get media upload session status
      parameters:
        - $ref: "#/components/parameters/UploadSessionId"
      responses:
        "200":
          description: Current upload status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSessionStatus"
  /media/upload-sessions/{uploadSessionId}/complete:
    post:
      operationId: completeUploadSession
      tags:
        - Media
      security:
        - ApiKey: []
      summary: Complete media upload session
      parameters:
        - $ref: "#/components/parameters/UploadSessionId"
      responses:
        "200":
          description: Upload completion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSessionStatus"
  /webhooks:
    post:
      operationId: createWebhookEndpoint
      tags:
        - Webhooks
      security:
        - ApiKey: []
      summary: Register webhook endpoint
      description: |
        Registers a URL to receive webhook events for the specified event types.

        The response includes a `signingSecret` (base64-encoded, 32 bytes) that is
        returned **once only**. Use it to verify the `X-Woop-Signature` header on
        incoming webhook payloads.

        **Signature format:** `t=<unix>,v1=<hmac-sha256-hex>`
        **Signed payload:** `<unix>.<json-body>`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookEndpointRequest"
      responses:
        "201":
          description: Webhook endpoint registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "422":
          description: Validation error (unknown event type, empty url, etc.).
    get:
      operationId: listWebhookEndpoints
      tags:
        - Webhooks
      security:
        - ApiKey: []
      summary: List webhook endpoints
      description: Returns all registered webhook endpoints for the organization. The `signingSecret` field is omitted.
      responses:
        "200":
          description: Webhook endpoints.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookEndpoint"
  /webhooks/{webhookId}:
    delete:
      operationId: deleteWebhookEndpoint
      tags:
        - Webhooks
      security:
        - ApiKey: []
      summary: Delete webhook endpoint
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Endpoint deleted.
        "404":
          description: Endpoint not found.
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      security:
        - ApiKey: []
      summary: Health check 
      description: Returns a minimal response proving the WoopSocial API is reachable.
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  parameters:
    ProjectIdFilter:
      name: projectId
      in: query
      required: false
      schema:
        type: string
      description: Filter to resources that belong to a specific project.
    ProjectIdsFilter:
      name: projectId
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
      description: Filter to one or more projects. Provide a comma-separated list of project IDs.
    SocialAccountIdsFilter:
      name: socialAccountId
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
      description: Filter to one or more connected social accounts. Provide a comma-separated list of social account IDs.
    PostIdsFilter:
      name: postId
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
      description: Filter to one or more parent posts. Provide a comma-separated list of post IDs.
    SocialPlatformFilter:
      name: platform
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/SocialPlatform"
      description: Filter to one or more social platforms. Provide a comma-separated list of platform values.
    DeliveryStatusFilter:
      name: deliveryStatus
      in: query
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/DeliveryStatus"
      description: Filter to one or more delivery statuses. Provide a comma-separated list of delivery status values.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 50
      description: Number of items to return.
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor for the next page of results.
    ProjectId:
      name: projectId
      in: query
      required: true
      schema:
        type: string
      description: Project that will own the uploaded media.
    SocialAccountId:
      name: socialAccountId
      in: path
      required: true
      schema:
        type: string
      description: Connected social account identifier.
    PostId:
      name: postId
      in: path
      required: true
      schema:
        type: string
      description: Post identifier.
    UploadSessionId:
      name: uploadSessionId
      in: path
      required: true
      schema:
        type: string
      description: Media upload session identifier.
  securitySchemes:
    ApiKey:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    WebhookEventType:
      type: string
      enum:
        - socialAccountPost.delivery.succeeded
        - socialAccountPost.delivery.failed
    CreateWebhookEndpointRequest:
      type: object
      required:
        - url
        - eventTypes
      properties:
        url:
          type: string
          description: The HTTPS URL to POST webhook events to.
        eventTypes:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
          minItems: 1
    WebhookEndpoint:
      type: object
      required:
        - id
        - url
        - eventTypes
        - createdAt
      properties:
        id:
          type: string
          description: Webhook endpoint identifier (int64 as string).
        url:
          type: string
        eventTypes:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
        createdAt:
          type: string
          format: date-time
        signingSecret:
          type: string
          description: Base64-encoded 32-byte signing secret. Returned once on creation only.
    WebhookEvent:
      type: object
      description: Payload delivered to registered webhook URLs.
      required:
        - eventType
        - occurredAt
        - postId
        - socialAccountPostId
        - socialAccountId
        - platform
      properties:
        eventType:
          $ref: "#/components/schemas/WebhookEventType"
        occurredAt:
          type: string
          format: date-time
        postId:
          type: string
        accountPostId:
          type: string
        socialAccountId:
          type: string
        platform:
          $ref: "#/components/schemas/SocialPlatform"
        externalPostId:
          type: string
          description: Platform's own post identifier. Present on succeeded events.
        externalPostUrl:
          type: string
          description: Public URL of the post on the platform. Present on succeeded events.
        errorMessage:
          type: string
          description: Error detail. Present on failed events.
    Project:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Project identifier.
        name:
          type: string
          description: Human-readable project name.
    SocialAccountStatus:
      type: string
      enum:
        - CONNECTED
        - DISCONNECTED
    SocialPlatform:
      type: string
      enum:
        - PINTEREST
        - LINKEDIN
        - LINKEDIN_PAGES
        - INSTAGRAM
        - FACEBOOK
        - TIKTOK
        - X
        - YOUTUBE
      description: Social platform supported by WoopSocial.
    CreateOAuthAuthorizationRequest:
      type: object
      additionalProperties: false
      required:
        - projectId
        - platform
      properties:
        projectId:
          type: string
          description: Project identifier.
        platform:
          $ref: "#/components/schemas/SocialPlatform"
    CreateOAuthAuthorizationResponse:
      type: object
      additionalProperties: false
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Browser URL that starts the OAuth authorization flow.
    SocialAccount:
      type: object
      additionalProperties: false
      required:
        - id
        - platform
        - username
        - imageUrl
        - status
      properties:
        id:
          type: string
          description: Social account identifier.
        platform:
          $ref: "#/components/schemas/SocialPlatform"
          description: Social platform for the connected account.
        username:
          type: string
          description: Display name or username for the connected account.
        imageUrl:
          type: string
          format: uri
          description: Profile image URL for the connected account.
        status:
          $ref: "#/components/schemas/SocialAccountStatus"
          description: Connection status of the account.
    SocialAccountPlatformInputs:
      type: object
      additionalProperties: false
      required:
        - socialAccountId
        - platformSpecificInputs
      properties:
        socialAccountId:
          type: string
          description: Connected social account identifier.
        platformSpecificInputs:
          $ref: "#/components/schemas/SocialAccountPlatformSpecificInputs"
    SocialAccountPlatformSpecificInputs:
      oneOf:
        - $ref: "#/components/schemas/PinterestSocialAccountPlatformSpecificInputs"
        - $ref: "#/components/schemas/TikTokSocialAccountPlatformSpecificInputs"
      discriminator:
        propertyName: platform
        mapping:
          PINTEREST: "#/components/schemas/PinterestSocialAccountPlatformSpecificInputs"
          TIKTOK: "#/components/schemas/TikTokSocialAccountPlatformSpecificInputs"
    PinterestSocialAccountPlatformSpecificInputs:
      title: Pinterest Social Account Platform Specific Inputs
      type: object
      additionalProperties: false
      required:
        - platform
        - boards
      properties:
        platform:
          allOf:
            - $ref: "#/components/schemas/SocialPlatform"
            - type: string
              enum:
                - PINTEREST
        boards:
          type: array
          description: |
            Available Pinterest boards for this account.

            Each `id` value can be sent as `pinterestBoardId` when creating a
            post for a Pinterest social-account target.
          items:
            $ref: "#/components/schemas/PinterestBoardOption"
    TikTokSocialAccountPlatformSpecificInputs:
      title: TikTok Social Account Platform Specific Inputs
      type: object
      additionalProperties: false
      required:
        - platform
        - privacyLevelOptions
        - commentAvailable
        - duetAvailable
        - stitchAvailable
        - maxVideoPostDurationSec
      properties:
        platform:
          allOf:
            - $ref: "#/components/schemas/SocialPlatform"
            - type: string
              enum:
                - TIKTOK
        privacyLevelOptions:
          type: array
          description: |
            Privacy values currently allowed for this TikTok account.

            Each value can be sent as `privacyLevel` when creating a post for a
            TikTok social-account target.
          items:
            $ref: "#/components/schemas/TikTokPrivacyLevel"
        commentAvailable:
          type: boolean
          description: Whether comments can currently be allowed for this TikTok account.
        duetAvailable:
          type: boolean
          description: Whether duets can currently be allowed for video posts on this TikTok account.
        stitchAvailable:
          type: boolean
          description: Whether stitches can currently be allowed for video posts on this TikTok account.
        maxVideoPostDurationSec:
          type: integer
          format: int32
          minimum: 1
          description: Maximum TikTok video duration currently allowed for this account.
    PinterestBoardOption:
      type: object
      additionalProperties: false
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Pinterest board identifier.
        name:
          type: string
          description: Human-readable Pinterest board name.
    DeliveryStatus:
      type: string
      description: |
        Delivery lifecycle status for a post.

        `NOT_STARTED`: The post exists and is scheduled, but delivery has not started yet.
        `SENDING`: Delivery is currently in progress.
        `SENT`: Delivery completed successfully.
        `FAILED`: Delivery completed unsuccessfully.
      enum:
        - NOT_STARTED
        - SENDING
        - SENT
        - FAILED
    PostContentMediaInput:
      description: |
        Content media reference.
      oneOf:
        - $ref: "#/components/schemas/MediaLibraryPostContentMediaInput"
      discriminator:
        propertyName: type
        mapping:
          MEDIA_LIBRARY: "#/components/schemas/MediaLibraryPostContentMediaInput"
    MediaLibraryPostContentMediaInput:
      title: Media Library Input
      type: object
      additionalProperties: false
      required:
        - type
        - mediaId
      properties:
        type:
          type: string
          enum:
            - MEDIA_LIBRARY
        mediaId:
          type: string
          description: Media identifier from the media library.
    PostContentMedia:
      description: |
        Resolved content media.
      oneOf:
        - $ref: "#/components/schemas/MediaLibraryPostContentMedia"
      discriminator:
        propertyName: type
        mapping:
          MEDIA_LIBRARY: "#/components/schemas/MediaLibraryPostContentMedia"
    MediaLibraryPostContentMedia:
      title: Media Library Post Content Media
      type: object
      additionalProperties: false
      required:
        - type
        - mediaId
        - mediaType
        - url
        - thumbnailUrl
      properties:
        type:
          type: string
          enum:
            - MEDIA_LIBRARY
        mediaId:
          type: string
          description: Media identifier from the media library.
        mediaType:
          type: string
          enum:
            - IMAGE
            - VIDEO
        url:
          type: string
          format: uri
          description: Canonical media URL.
        thumbnailUrl:
          type: string
          format: uri
          description: Thumbnail or preview URL for the media item.
    PostContentItemInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        text:
          type: string
          description: Text content for this thread item.
        media:
          type: array
          items:
            $ref: "#/components/schemas/PostContentMediaInput"
    PostContentItem:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        text:
          type: string
          description: Text content for this thread item.
        media:
          type: array
          items:
            $ref: "#/components/schemas/PostContentMedia"
    PostContentInput:
      type: array
      minItems: 1
      maxItems: 1
      description: |
        Post content expressed as thread items.

        The array exists for future thread support. Currently exactly one item
        is supported.
      items:
        $ref: "#/components/schemas/PostContentItemInput"
    PostContent:
      type: array
      minItems: 1
      maxItems: 1
      description: |
        Post content expressed as thread items.

        The array exists for future thread support. Currently exactly one item
        is returned.
      items:
        $ref: "#/components/schemas/PostContentItem"
    PostSchedule:
      oneOf:
        - $ref: "#/components/schemas/DraftPostSchedule"
        - $ref: "#/components/schemas/PublishNowPostSchedule"
        - $ref: "#/components/schemas/ScheduleForLaterPostSchedule"
      discriminator:
        propertyName: type
        mapping:
          DRAFT: "#/components/schemas/DraftPostSchedule"
          PUBLISH_NOW: "#/components/schemas/PublishNowPostSchedule"
          SCHEDULE_FOR_LATER: "#/components/schemas/ScheduleForLaterPostSchedule"
    DraftPostSchedule:
      title: Draft
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - DRAFT
    PublishNowPostSchedule:
      title: Publish Now
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - PUBLISH_NOW
    ScheduleForLaterPostSchedule:
      title: Schedule For Later
      type: object
      additionalProperties: false
      required:
        - type
        - scheduledFor
      properties:
        type:
          type: string
          enum:
            - SCHEDULE_FOR_LATER
        scheduledFor:
          type: string
          format: date-time
          description: UTC time (ISO 8601) when the post should be published.
    CreatePostRequest:
      type: object
      additionalProperties: false
      required:
        - content
        - schedule
        - socialAccounts
      properties:
        content:
          $ref: "#/components/schemas/PostContentInput"
        schedule:
          $ref: "#/components/schemas/PostSchedule"
        socialAccounts:
          type: array
          minItems: 1
          description: |
            Social-account targets for this post.

            All referenced social accounts must belong to the same project.
            Duplicate `socialAccountId` values are invalid.
          items:
            $ref: "#/components/schemas/SocialAccountInput"
    Post:
      type: object
      additionalProperties: false
      required:
        - id
        - projectId
        - content
        - schedule
        - socialAccountPosts
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Post identifier.
        projectId:
          type: string
          description: Project identifier derived from the selected social accounts.
        content:
          $ref: "#/components/schemas/PostContent"
        schedule:
          $ref: "#/components/schemas/PostSchedule"
        socialAccountPosts:
          type: array
          minItems: 1
          description: Social account posts for this parent post.
          items:
            $ref: "#/components/schemas/SocialAccountPost"
        createdAt:
          type: string
          format: date-time
          description: UTC time when the post was created.
        updatedAt:
          type: string
          format: date-time
          description: UTC time when the post was last updated.
    ListSocialAccountPostsResponse:
      type: object
      additionalProperties: false
      required:
        - socialAccountPosts
      properties:
        socialAccountPosts:
          type: array
          items:
            $ref: "#/components/schemas/SocialAccountPost"
        nextCursor:
          type: string
          description: Opaque cursor for the next page of results. Omitted when there are no more results.
    CreateMediaResponse:
      type: object
      additionalProperties: false
      required:
        - mediaId
      properties:
        mediaId:
          type: string
          description: Media identifier.
    CreateUploadSessionRequest:
      type: object
      additionalProperties: false
      required:
        - projectId
        - fileSizeInBytes
      properties:
        projectId:
          type: string
          description: Project that will own the uploaded media.
        fileSizeInBytes:
          type: integer
          format: int64
          minimum: 1
          description: Total size of the file that will be uploaded.
    UploadSessionPart:
      type: object
      additionalProperties: false
      required:
        - partNumber
        - uploadUrl
      properties:
        partNumber:
          type: integer
          format: int32
          minimum: 1
          description: 1-based part number to upload to this URL.
        uploadUrl:
          type: string
          format: uri
          description: Presigned URL that accepts the bytes for `partNumber`.
    UploadSession:
      type: object
      additionalProperties: false
      required:
        - uploadSessionId
        - partSizeInBytes
        - partCount
        - expiresAt
        - parts
      properties:
        uploadSessionId:
          type: string
          description: Media upload session identifier.
        partSizeInBytes:
          type: integer
          format: int64
          description: |
            Maximum chunk size to use when slicing the file into parts.

            For uploads with more than one part, every part except the last must
            be exactly this size. The last part may be smaller. For a single-part
            upload, the only part may be smaller than this size.
        partCount:
          type: integer
          format: int32
          description: Number of parts that must be uploaded before completion.
        expiresAt:
          type: string
          format: date-time
          description: Time when the presigned part upload URLs expire.
        parts:
          type: array
          description: Presigned upload targets, in part-number order.
          items:
            $ref: "#/components/schemas/UploadSessionPart"
            description: Presigned URL and part number for uploading one chunk of the file.
    UploadSessionStatus:
      oneOf:
        - $ref: "#/components/schemas/UploadSessionInitiatedStatus"
        - $ref: "#/components/schemas/UploadSessionUploadedStatus"
        - $ref: "#/components/schemas/UploadSessionReadyStatus"
        - $ref: "#/components/schemas/UploadSessionFailedStatus"
        - $ref: "#/components/schemas/UploadSessionAbortedStatus"
      discriminator:
        propertyName: status
        mapping:
          INITIATED: "#/components/schemas/UploadSessionInitiatedStatus"
          UPLOADED: "#/components/schemas/UploadSessionUploadedStatus"
          READY: "#/components/schemas/UploadSessionReadyStatus"
          FAILED: "#/components/schemas/UploadSessionFailedStatus"
          ABORTED: "#/components/schemas/UploadSessionAbortedStatus"
    UploadSessionInitiatedStatus:
      title: Upload Session Initiated Status
      type: object
      additionalProperties: false
      required:
        - uploadSessionId
        - status
      properties:
        uploadSessionId:
          type: string
          description: Media upload session identifier.
        status:
          type: string
          enum:
            - INITIATED
    UploadSessionUploadedStatus:
      title: Upload Session Uploaded Status
      type: object
      additionalProperties: false
      required:
        - uploadSessionId
        - status
      properties:
        uploadSessionId:
          type: string
          description: Media upload session identifier.
        status:
          type: string
          enum:
            - UPLOADED
    UploadSessionReadyStatus:
      title: Upload Session Ready Status
      type: object
      additionalProperties: false
      required:
        - uploadSessionId
        - status
        - mediaId
      properties:
        uploadSessionId:
          type: string
          description: Media upload session identifier.
        status:
          type: string
          enum:
            - READY
        mediaId:
          type: string
          description: Media identifier created by the completed upload.
    UploadSessionFailedStatus:
      title: Upload Session Failed Status
      type: object
      additionalProperties: false
      required:
        - uploadSessionId
        - status
        - failureCode
        - failureMessage
      properties:
        uploadSessionId:
          type: string
          description: Media upload session identifier.
        status:
          type: string
          enum:
            - FAILED
        failureCode:
          type: string
          description: Machine-readable failure code for the upload session.
        failureMessage:
          type: string
          description: Human-readable summary of why the upload session failed.
    UploadSessionAbortedStatus:
      title: Upload Session Aborted Status
      type: object
      additionalProperties: false
      required:
        - uploadSessionId
        - status
      properties:
        uploadSessionId:
          type: string
          description: Media upload session identifier.
        status:
          type: string
          enum:
            - ABORTED
    SocialAccountInput:
      oneOf:
        - $ref: "#/components/schemas/PinterestInput"
        - $ref: "#/components/schemas/InstagramInput"
        - $ref: "#/components/schemas/FacebookInput"
        - $ref: "#/components/schemas/TikTokInput"
        - $ref: "#/components/schemas/YouTubeInput"
        - $ref: "#/components/schemas/XInput"
        - $ref: "#/components/schemas/LinkedInInput"
        - $ref: "#/components/schemas/LinkedInPagesInput"
      discriminator:
        propertyName: platform
        mapping:
          PINTEREST: "#/components/schemas/PinterestInput"
          INSTAGRAM: "#/components/schemas/InstagramInput"
          FACEBOOK: "#/components/schemas/FacebookInput"
          TIKTOK: "#/components/schemas/TikTokInput"
          YOUTUBE: "#/components/schemas/YouTubeInput"
          X: "#/components/schemas/XInput"
          LINKEDIN: "#/components/schemas/LinkedInInput"
          LINKEDIN_PAGES: "#/components/schemas/LinkedInPagesInput"
    SocialAccountInputBase:
      type: object
      required:
        - socialAccountId
      properties:
        socialAccountId:
          type: string
          description: Connected social account identifier.
        contentOverride:
          $ref: "#/components/schemas/PostContentInput"
    SocialAccountPostBase:
      type: object
      additionalProperties: false
      required:
        - socialAccountPostId
        - postId
        - projectId
        - socialAccountId
        - deliveryStatus
        - content
        - schedule
        - createdAt
        - updatedAt
      properties:
        socialAccountPostId:
          type: string
          description: Social account post identifier.
        postId:
          type: string
          description: Parent post identifier.
        projectId:
          type: string
          description: Project identifier.
        socialAccountId:
          type: string
          description: Connected social account identifier.
        deliveryStatus:
          $ref: "#/components/schemas/DeliveryStatus"
        content:
          $ref: "#/components/schemas/PostContent"
          description: Content for this social account post.
        schedule:
          $ref: "#/components/schemas/PostSchedule"
          description: Schedule for this social account post.
        createdAt:
          type: string
          format: date-time
          description: UTC time when the social account post was created.
        updatedAt:
          type: string
          format: date-time
          description: UTC time when the social account post was last updated.
        deliveryCompletedAt:
          type: string
          format: date-time
          description: UTC time when the latest delivery attempt for this social account post completed both for successful (`SENT`) and unsuccessful (`FAILED`) terminal `deliveryStatus` values.
        externalPostId:
          type: string
        externalPostUrl:
          type: string
          format: uri
        errorMessage:
          type: string
    PinterestPlatform:
      type: object
      required:
        - platform
      properties:
        platform:
          allOf:
