examples:
  listPosts:
    speakeasy-default-list-posts:
      responses:
        "200":
          application/json: {"posts": []}
  deletePosts:
    speakeasy-default-delete-posts:
      requestBody:
        application/json: ["<value 1>", "<value 2>"]
      responses:
        "200":
          application/json: {"results": []}
  createPosts:
    speakeasy-default-create-posts:
      requestBody:
        application/json: [{"idempotencyKey": "<value>", "projectId": "<id>", "socialAccountId": "<id>", "scheduledForUTC": "2026-09-06T03:53:11.539Z", "platformSpecifics": {"platform": "LINKEDIN_PAGES"}}]
      responses:
        "200":
          application/json: {"results": [{"status": "SUCCESS", "idempotencyKey": "<value>", "id": "<id>", "validationWarnings": [{"field": "TIKTOK_PRIVACY_LEVEL", "message": "<value>"}]}]}
  updatePosts:
    speakeasy-default-update-posts:
      requestBody:
        application/json: []
      responses:
        "200":
          application/json: {"results": []}
  listProjects:
    speakeasy-default-list-projects:
      responses:
        "200":
          application/json: [{"id": "<id>", "name": "<value>"}]
  createOAuthAuthorization:
    speakeasy-default-create-O-auth-authorization:
      requestBody:
        application/json: {"projectId": "<id>", "platform": "YOUTUBE"}
      responses:
        "200":
          application/json: {"url": "https://mammoth-makeover.biz"}
  listSocialAccounts:
    speakeasy-default-list-social-accounts:
      responses:
        "200":
          application/json: [{"id": "<id>", "platform": "X", "username": "Leonora.Pollich86", "imageUrl": "https://kosher-ectoderm.com", "status": "DISCONNECTED"}]
  getSocialAccountPlatformInputs:
    speakeasy-default-get-social-account-platform-inputs:
      parameters:
        path:
          socialAccountId: "<id>"
      responses:
        "200":
          application/json: {"socialAccountId": "<id>", "platform": "PINTEREST", "platformSpecificInputs": {"platform": "TIKTOK", "tiktok": {"privacyLevelOptions": [], "commentDisabled": true, "duetDisabled": false, "stitchDisabled": true, "maxVideoPostDurationSec": 103390}}}
  createMedia:
    speakeasy-default-create-media:
      parameters:
        query:
          projectId: "<id>"
      requestBody:
        application/octet-stream: "x-file: example.file"
      responses:
        "200":
          application/json: {"mediaId": "<id>"}
  createUploadSession:
    speakeasy-default-create-upload-session:
      requestBody:
        application/json: {"projectId": "<id>", "fileSizeInBytes": 793468}
      responses:
        "200":
          application/json: {"uploadSessionId": "<id>", "partSizeInBytes": 193941, "partCount": 386921, "expiresAt": "2024-10-27T08:45:12.940Z", "parts": []}
  getUploadSession:
    speakeasy-default-get-upload-session:
      parameters:
        path:
          uploadSessionId: "<id>"
      responses:
        "200":
          application/json: {"uploadSessionId": "<id>", "status": "FAILED"}
  completeUploadSession:
    speakeasy-default-complete-upload-session:
      parameters:
        path:
          uploadSessionId: "<id>"
      responses:
        "200":
          application/json: {"uploadSessionId": "<id>", "status": "ABORTED"}
  getHealth:
    speakeasy-default-get-health:
      responses:
        "200":
          application/json: {"message": "Hello from WoopSocial API", "timestampUTC": "2026-03-28T09:30:26.123Z", "version": "v1"}
